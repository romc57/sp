services:
  gateway:
    image: nginx:alpine
    volumes:
      - ./infra/dev/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    expose:
      - "80"

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npm run dev -- --host 0.0.0.0 --port 5173
    expose:
      - "5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

volumes:
  node_modules:
